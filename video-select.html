<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеоуроки - Выбор класса</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
        header { 
            position: fixed; top: 0; width: 100%; 
            background: rgba(30,60,114,0.95); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            padding: 1rem 0;
        }
        nav { 
            max-width: 1200px; margin: 0 auto; 
            display: flex; justify-content: space-between; 
            align-items: center; padding: 0 2rem;
        }
        .logo { 
            font-size: 1.8rem; font-weight: 900; 
            background: linear-gradient(45deg, #ff6b35, #f7931e); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .back-btn { 
            background: linear-gradient(45deg, #ff6b35, #f7931e); 
            color: white; padding: 0.8rem 2rem; 
            border-radius: 30px; font-weight: 700; 
            text-decoration: none; box-shadow: 0 5px 15px rgba(255,107,53,0.4);
            transition: all 0.3s;
        }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,107,53,0.6); }
        
        .hero { 
            min-height: 100vh; padding: 140px 2rem 4rem; 
            text-align: center; max-width: 800px; margin: 0 auto;
        }
        .title { 
            font-size: 3.5rem; font-weight: 900; 
            background: linear-gradient(45deg, #ff6b35, #f7931e); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 4rem; 
        }
        .class-buttons { 
            display: flex; gap: 3rem; justify-content: center; 
            flex-wrap: wrap;
        }
        .class-video-btn { 
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1)); 
            backdrop-filter: blur(10px); 
            color: white; padding: 2.5rem 3rem; 
            border-radius: 40px; font-weight: 900; font-size: 2.2rem; 
            text-decoration: none; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 3px solid rgba(255,255,255,0.3);
            transition: all 0.4s; min-width: 220px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .class-video-btn:hover { 
            transform: translateY(-15px) scale(1.05); 
            box-shadow: 0 30px 70px rgba(0,0,0,0.6);
            border-color: rgba(255,255,255,0.6);
        }
        .class5 { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .class6 { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        
        @media (max-width: 768px) {
            .class-buttons { flex-direction: column; gap: 2rem; }
            .title { font-size: 2.5rem; }
            .class-video-btn { font-size: 1.8rem; padding: 2rem; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">MathBlast</div>
            <a href="kurs.html" class="back-btn">← К курсам</a>
        </nav>
    </header>

    <section class="hero">
        <h1 class="title">🎥 ВИДЕОУРОКИ</h1>
        <div class="class-buttons">
            <a href="video-5class.html" class="class-video-btn class5">📚 5 Класс</a>
            <a href="video-6class.html" class="class-video-btn class6">📖 6 Класс</a>
        </div>
    </section>
</body>
</html>
