<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеоуроки 6 класс</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: white;
        }
        
        /* Шапка */
        header { 
            position: fixed; top: 0; width: 100%; 
            background: rgba(30,60,114,0.95); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            padding: 1rem 0;
        }
        nav { 
            max-width: 1200px; margin: 0 auto; 
            display: flex; justify-content: space-between; 
            align-items: center; padding: 0 2rem;
        }
        .logo { 
            font-size: 1.8rem; font-weight: 900; 
            background: linear-gradient(45deg, #ff6b35, #f7931e); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .back-btn { 
            background: linear-gradient(45deg, #ff6b35, #f7931e); 
            color: white; padding: 0.8rem 2rem; 
            border-radius: 30px; font-weight: 700; 
            text-decoration: none; box-shadow: 0 5px 15px rgba(255,107,53,0.4);
            transition: all 0.3s;
        }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,107,53,0.6); }
        
        .hero { 
            min-height: 100vh; padding: 120px 2rem 4rem; 
            text-align: center; max-width: 1200px; margin: 0 auto;
        }
        
        /* 🔥 СУПЕР ЯРКИЙ ЗЕЛЁНЫЙ НЕОНОВЫЙ ЗАГОЛОВОК 🔥 */
        .class-title { 
            font-size: 5rem; font-weight: 900; 
            background: linear-gradient(45deg, #00FF88, #00CC6A, #00B359, #00FF41); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 3rem 0 4rem 0; 
            text-shadow: 
                0 0 20px rgba(0,255,136,0.9),
                0 0 40px rgba(0,204,106,0.7),
                4px 4px 12px rgba(0,0,0,0.8);
            letter-spacing: 3px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { 
                text-shadow: 
                    0 0 20px rgba(0,255,136,0.9),
                    0 0 40px rgba(0,204,106,0.7),
                    4px 4px 12px rgba(0,0,0,0.8);
            }
            to { 
                text-shadow: 
                    0 0 30px rgba(0,255,136,1),
                    0 0 60px rgba(0,204,106,0.9),
                    6px 6px 16px rgba(0,0,0,0.9);
            }
        }
        
        .videos-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 1.8rem; 
            max-width: 1100px; 
            margin: 0 auto; 
        }
        .video-btn { 
            min-height: 130px; 
            padding: 1.2rem; 
            border-radius: 25px; 
            font-weight: 800; 
            font-size: 1rem; 
            line-height: 1.3;
            text-decoration: none; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            color: white !important; 
            text-shadow: 2px 2px 6px #000 !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
            transition: all 0.4s;
        }
        .video-btn::before { 
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1)); 
            z-index: 0; border-radius: 25px;
        }
        .video-btn > * { position: relative; z-index: 1; }
        .video-btn:hover { 
            transform: translateY(-12px) scale(1.02); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .video-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        
        /* Цвета кнопок */
        .video1 { background: linear-gradient(135deg, #3498db, #5dade2); }
        .video2 { background: linear-gradient(135deg, #e74c3c, #ec7063); }
        .video3 { background: linear-gradient(135deg, #27ae60, #58d68d); }
        .video4 { background: linear-gradient(135deg, #f39c12, #f4b350); }
        .video5 { background: linear-gradient(135deg, #9b59b6, #bb8fce); }
        .video6 { background: linear-gradient(135deg, #1abc9c, #48c9b0); }
        .video7 { background: linear-gradient(135deg, #ff6b35, #f7a57c); }
        .video8 { background: linear-gradient(135deg, #e67e22, #eba572); }
        
        @media (max-width: 768px) {
            .videos-grid { grid-template-columns: 1fr 1fr; gap: 1.5rem; }
            .class-title { font-size: 3.5rem; }
            .video-btn { font-size: 0.9rem; min-height: 120px; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">MathBlast</div>
            <a href="video-select.html" class="back-btn">← К выбору класса</a>
        </nav>
    </header>

    <section class="hero">
        <h1 class="class-title">🎥 ВИДЕОУРОКИ 6 КЛАСС</h1>
        
        <div class="videos-grid">
            <a href="https://cloud.mail.ru/public/q67E/7uCL29sYZ" target="_blank" class="video-btn video1">
                <div class="video-icon">➕</div>
                <div>Сложение и<br>вычитание дробей</div>
            </a>
            
            <a href="https://cloud.mail.ru/public/gKUq/TunnosAQz" target="_blank" class="video-btn video2">
                <div class="video-icon">🔢</div>
                <div>Смешанные<br>числа</div>
            </a>
            
            <a href="https://cloud.mail.ru/public/z5e4/fYtG44tmm" target="_blank" class="video-btn video3">
                <div class="video-icon">➕</div>
                <div>Сложение<br>смешанных чисел</div>
            </a>
            
            <a href="https://cloud.mail.ru/public/hzna/gESXP2B5P" target="_blank" class="video-btn video4">
                <div class="video-icon">➖</div>
                <div>Вычитание<br>смешанных чисел</div>
            </a>
            
            <a href="https://cloud.mail.ru/public/Nder/xrxbUg73e" target="_blank" class="video-btn video5">
                <div class="video-icon">📏</div>
                <div>Основное свойство<br>дроби</div>
            </a>
            
            <a href="https://cloud.mail.ru/public/6uXw/APmtyAhET" target="_blank" class="video-btn video6">
                <div class="video-icon">✂️</div>
                <div>Сокращение<br>дробей</div>
            </a>
            
            <a href="https://cloud.mail.ru/public/JU2C/DayA9cFpN" target="_blank" class="video-btn video7">
                <div class="video-icon">✕</div>
                <div>Умножение<br>дробей</div>
            </a>
            
            <a href="https://cloud.mail.ru/public/Ex2h/hbJDaTzdm" target="_blank" class="video-btn video8">
                <div class="video-icon">✕</div>
                <div>Умножение с<br>разными знаками</div>
            </a>
        </div>
    </section>
</body>
</html>
