<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 класс - Математическая галактика</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }
        
        /* Шапка и стили как раньше - без изменений */
        header { 
            position: fixed; top: 0; width: 100%; 
            background: rgba(30,60,114,0.95); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
            padding: 1rem 0;
        }
        nav { 
            max-width: 1200px; margin: 0 auto; 
            display: flex; justify-content: space-between; 
            align-items: center; padding: 0 2rem;
        }
        .logo { 
            font-size: 1.8rem; font-weight: 900; 
            background: linear-gradient(45deg, #ff6b35, #f7931e); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .back-btn { 
            background: linear-gradient(45deg, #ff6b35, #f7931e); 
            color: white; padding: 0.8rem 2rem; 
            border-radius: 30px; font-weight: 700; 
            text-decoration: none; box-shadow: 0 5px 15px rgba(255,107,53,0.4);
            transition: all 0.3s;
        }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,107,53,0.6); }
        
        .hero { 
            min-height: 100vh; padding: 120px 2rem 4rem; 
            text-align: center; max-width: 1200px; margin: 0 auto;
        }
        
        /* Яркий заголовок */
        .class-title { 
            font-size: 5.5rem; font-weight: 900; 
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF8C00, #FF4500); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 3rem 0 5rem 0; 
            text-shadow: 
                0 0 20px rgba(255,215,0,0.8),
                0 0 40px rgba(255,165,0,0.6),
                4px 4px 10px rgba(0,0,0,0.7);
            letter-spacing: 4px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { 
                text-shadow: 
                    0 0 20px rgba(255,215,0,0.8),
                    0 0 40px rgba(255,165,0,0.6),
                    4px 4px 10px rgba(0,0,0,0.7);
            }
            to { 
                text-shadow: 
                    0 0 30px rgba(255,215,0,1),
                    0 0 60px rgba(255,165,0,0.8),
                    6px 6px 15px rgba(0,0,0,0.8);
            }
        }
        
        /* ✅ 3x2 сетка для 10 тем */
        .topics-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 1.8rem; 
            max-width: 1100px; 
            margin: 0 auto; 
        }
        .topic-btn { 
            min-height: 140px; 
            padding: 1.2rem; 
            border-radius: 25px; 
            font-weight: 800; 
            font-size: 1rem; 
            line-height: 1.3;
            text-decoration: none; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            color: #ffffff !important; 
            text-shadow: 2px 2px 6px #000000 !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
            transition: all 0.4s;
        }
        .topic-btn::before { 
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1)); 
            z-index: 0; border-radius: 25px;
        }
        .topic-btn > * { position: relative; z-index: 1; }
        .topic-btn:hover { 
            transform: translateY(-12px) scale(1.02); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .topic-icon { font-size: 2.8rem; margin-bottom: 0.6rem; }
        
        /* Цвета кнопок */
        .topic-frac1 { background: linear-gradient(135deg, #3498db, #5dade2); }
        .topic-frac2 { background: linear-gradient(135deg, #27ae60, #58d68d); }
        .topic-mix { background: linear-gradient(135deg, #e74c3c, #ec7063); }
        .topic-mul { background: linear-gradient(135deg, #f39c12, #f4b350); }
        .topic-div { background: linear-gradient(135deg, #9b59b6, #bb8fce); }
        .topic-dec { background: linear-gradient(135deg, #1abc9c, #48c9b0); }
        .topic-divis { background: linear-gradient(135deg, #ff6b35, #f7a57c); }
        .topic-decadd { background: linear-gradient(135deg, #34495e, #5d6d7e); }
        .topic-mixnum { background: linear-gradient(135deg, #e67e22, #eba572); }
        .topic-round { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        
        @media (max-width: 768px) {
            .topics-grid { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
            .class-title { font-size: 3.8rem; }
            .topic-btn { font-size: 0.95rem; min-height: 130px; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">MathBlast</div>
            <a href="kurs.html" class="back-btn">← Назад к курсам</a>
        </nav>
    </header>

    <section class="hero">
        <!-- 🔥 ЯРКИЙ ЗАГОЛОВОК -->
        <h1 class="class-title">5 КЛАСС</h1>

        <!-- ✅ ВАШИ 10 Scratch-ТЕМ -->
        <div class="topics-grid">
            <a href="https://scratch.mit.edu/projects/1080667552" target="_blank" class="topic-btn topic-frac1" title="Основное свойство дроби">
                <div class="topic-icon">📏</div>
                <div>Основное свойство<br>дроби</div>
            </a>
            
            <a href="https://scratch.mit.edu/projects/1080668342" target="_blank" class="topic-btn topic-frac2" title="Сложение и вычитание дробей">
                <div class="topic-icon">➕</div>
                <div>Сложение и<br>вычитание дробей</div>
            </a>
            
            <a href="https://scratch.mit.edu/projects/1126592667" target="_blank" class="topic-btn topic-mix" title="Сложение и вычитание смешанных чисел">
                <div class="topic-icon">🔢</div>
                <div>Смешанные<br>числа</div>
            </a>
            
            <a href="https://scratch.mit.edu/projects/1080669257" target="_blank" class="topic-btn topic-mul" title="Умножение обыкновенных дробей">
                <div class="topic-icon">✕</div>
                <div>Умножение<br>дробей</div>
            </a>
            
            <a href="https://scratch.mit.edu/projects/1080669363" target="_blank" class="topic-btn topic-div" title="Деление обыкновенных дробей">
                <div class="topic-icon">÷</div>
                <div>Деление<br>дробей</div>
            </a>
            
            <a href="https://scratch.mit.edu/projects/1080669474" target="_blank" class="topic-btn topic-dec" title="Сравнение десятичных дробей">
                <div class="topic-icon">⚖️</div>
                <div>Сравнение<br>десятичных</div>
            </a>
            
            <a href="https://scratch.mit.edu/projects/1090695391" target="_blank" class="topic-btn topic-divis" title="Признаки делимости">
                <div class="topic-icon">🔢</div>
                <div>Признаки<br>делимости</div>
            </a>
            
            <a href="https://scratch.mit.edu/projects/1090481742" target="_blank" class="topic-btn topic-decadd" title="Сложение десятичных дробей">
                <div class="topic-icon">➕</div>
                <div>Сложение<br>десятичных</div>
            </a>
            
            <a href="https://scratch.mit.edu/projects/1124601903" target="_blank" class="topic-btn topic-mixnum" title="Смешанные числа">
                <div class="topic-icon">🔢</div>
                <div>Смешанные<br>числа 2</div>
            </a>
            
            <a href="https://scratch.mit.edu/projects/1157686660" target="_blank" class="topic-btn topic-round" title="Округление чисел">
                <div class="topic-icon">📐</div>
                <div>Округление<br>чисел</div>
            </a>
        </div>
    </section>
</body>
</html>
